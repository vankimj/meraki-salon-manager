name            = "tenant-router"
main            = "worker.js"
compatibility_date = "2026-05-14"

# Routes — every subdomain of plumenexus.com flows through this Worker, EXCEPT
# subdomains with their own specific DNS record (admin., demo., www.) which
# have proxy=OFF and bypass Cloudflare entirely.
routes = [
  { pattern = "*.plumenexus.com/*", zone_name = "plumenexus.com" },
]
