    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Can I migrate from my current platform?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — and we make it painless. Export your client list and transaction history as CSV; we run a one-time import that brings over clients, services, employees, and historical receipts. Most salons are fully migrated within a single business day."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need to install anything?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Plume Nexus runs in any modern browser and is also a Progressive Web App (installable to your home screen with offline-tolerant POS). A native iOS + Android app with Tap-to-Pay is in active development."
            }
          },
          {
            "@type": "Question",
            "name": "How does AI fit in? Is my client data private?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "AI runs in read-only mode for reporting questions. We never train models on your data, and we never share it. All AI calls are processed server-side through your own Plume Nexus backend."
            }
          },
          {
            "@type": "Question",
            "name": "What payment processors do you support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Stripe is built in, with multi-tech credit splits, tip-per-service, gift cards, refunds, and Tap-to-Pay (iOS coming Q3). Each tenant connects their own Stripe account, so funds settle directly to your bank."
            }
          },
          {
            "@type": "Question",
            "name": "Is there a contract?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Month-to-month. Cancel any time. Annual billing saves 14% if you want to lock in."
            }
          }
        ]
      }
    </script>

    <style>
      :root {
        /* Editorial easing — slow, intentional curves */
        --pn-ease: cubic-bezier(0.16, 1, 0.3, 1);
        --pn-dur-fast: 350ms;
        --pn-dur: 700ms;
        --pn-dur-slow: 1000ms;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1a1410;
        background: #fbf8f1;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
      }
      a { color: inherit; }
      img { max-width: 100%; display: block; }
      ::selection { background: rgba(193,154,74,.35); color: #1a1410; }
      /* Default transition curve on any element that opts into a CSS transition */
      a, button { transition-timing-function: var(--pn-ease); }

      /* Visible focus ring for keyboard users — does not show on mouse click */
      :focus-visible {
        outline: 2px solid #5b3b8c;
        outline-offset: 2px;
        border-radius: 6px;
      }

      /* Skip link — visible only when focused via Tab */
      .pn-skip-link {
        position: absolute;
        left: -10000px;
        top: 12px;
        padding: 10px 16px;
        background: #0f1923;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        border-radius: 8px;
        text-decoration: none;
        z-index: 1000;
      }
      .pn-skip-link:focus {
        left: 12px;
      }

      /* Honor OS-level reduced-motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: .01ms !important;
          transition-duration: .01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
