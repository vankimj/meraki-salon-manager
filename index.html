<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="mobile-web-app-capable" content="yes">
<title>Meraki Salon Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#1a1a1a;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
#deck-app{
  position:relative;
  display:flex;
  flex-direction:column;
  width:100%;
  max-width:700px;
  height:620px;
  border:1px solid #e0e0e0;
  border-radius:16px;
  overflow:hidden;
  background:#f5f5f5;
  box-shadow:0 8px 40px rgba(0,0,0,0.35);
}
/* Fullscreen */
#deck-app:fullscreen,
#deck-app:-webkit-full-screen{
  max-width:100vw;
  width:100vw;
  height:100dvh;
  border-radius:0;
  box-shadow:none;
  border:none;
}
.deck-header{
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:11px 16px;
  border-bottom:1px solid #e8e8e8;
  background:#fff;
  z-index:2;
}
.deck-nav{
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:10px 16px;
  border-top:1px solid #e8e8e8;
  background:#fff;
  z-index:2;
}
button{
  font-family:inherit;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  background:#fff;
  border:1px solid #d0d0d0;
  border-radius:8px;
  padding:6px 14px;
  color:#333;
  transition:background .15s,border-color .15s;
}
button:hover{background:#f5f5f5;border-color:#bbb}
button:active{background:#ebebeb;transform:scale(.98)}
button:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-circle{
  width:34px;height:34px;
  border-radius:50%!important;
  padding:0!important;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.btn-icon{
  width:30px;height:30px;
  border-radius:8px!important;
  padding:0!important;
  display:flex;align-items:center;justify-content:center;
  border-color:#e8e8e8!important;
  color:#666;
}
#deck-actions{
  display:flex;gap:5px;
  opacity:0;
  transform:translateY(5px) scale(.95);
  pointer-events:none;
  transition:opacity .28s ease,transform .28s ease;
}
#deck-actions.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.action-btn{font-size:11px!important;padding:0 9px!important;height:28px!important}
#deck-slider{flex:1;overflow:hidden;cursor:grab;user-select:none;min-height:0}
#deck-slider:active{cursor:grabbing}
#deck-track{
  display:flex;height:100%;
  transition:transform .42s cubic-bezier(.25,.46,.45,.94);
  will-change:transform;
}
.slide-wrap{min-width:100%;height:100%;display:flex;padding:10px;gap:9px}
.slide-left{
  flex:1;display:flex;flex-direction:column;
  border-radius:10px;border:1px solid #e0e0e0;
  overflow:hidden;background:#efefef;
}
.slide-photo{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  min-height:0;
}
.slide-photo img{width:100%;height:100%;object-fit:cover;object-position:center top}
.default-badge{
  position:absolute;top:8px;right:8px;
  background:rgba(245,158,11,.92);color:#fff;
  font-size:9px;font-weight:600;padding:2px 7px;
  border-radius:20px;letter-spacing:.04em;
}
.nameplate{
  flex-shrink:0;
  height:54px;background:#fff;border-top:1px solid #e8e8e8;
  display:flex;align-items:center;justify-content:center;padding:0 14px;
}
.nameplate-name{
  font-family:Georgia,'Palatino Linotype',Palatino,serif;
  font-size:15px;font-weight:normal;letter-spacing:.025em;
  color:#1a1a1a;text-align:center;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
}
.nameplate-empty{
  font-family:Georgia,'Palatino Linotype',Palatino,serif;
  font-size:12px;color:#ccc;font-style:italic;
}
.slide-right{
  flex:1;background:#fff;border-radius:10px;border:1px solid #e0e0e0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 10px 28px;position:relative;overflow:hidden;min-height:0;
}
.slide-right.tappable{cursor:pointer}
.slide-right.tappable:active{background:#fafafa}
.qr-view{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
.qr-view.hidden{display:none}
.tap-hint{position:absolute;top:8px;right:10px;font-size:9px;color:#bbb}
.qr-dots{position:absolute;bottom:9px;display:flex;gap:5px;align-items:center}
.qr-dot{width:6px;height:6px;border-radius:50%;transition:background .2s}
.qr-handle-text{font-size:12px;font-weight:500;color:#666;text-align:center;letter-spacing:.01em}
#deck-dots{display:flex;gap:6px;align-items:flex-start;padding-top:1px}
.dot-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.dot-bar{height:6px;border-radius:3px;transition:width .25s,background .25s}
.dot-star{width:4px;height:4px;border-radius:50%;transition:background .2s}
.empty-state{
  min-width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
}
#deck-overlay,#gh-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.4);
  display:none;align-items:flex-end;
  z-index:10;
}
#deck-modal,#gh-modal{
  width:100%;background:#fff;
  border-top:1px solid #e8e8e8;
  padding:18px 18px 22px;
  max-height:90%;overflow-y:auto;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.25,.46,.45,.94);
}
.form-label{font-size:11px;color:#888;display:block;margin-bottom:5px}
.label-dot{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:middle;margin-right:5px}
.username-wrap{
  display:flex;align-items:center;
  border:1px solid #d8d8d8;border-radius:8px;
  background:#fafafa;overflow:hidden;
  transition:border-color .2s,background .2s;
}
.username-wrap:focus-within{border-color:#3D95CE;background:#fff}
.username-at{padding:8px 0 8px 12px;font-size:14px;font-weight:500;color:#aaa;user-select:none}
.username-wrap input{
  flex:1;border:none!important;background:transparent!important;
  padding:8px 12px 8px 3px;font-size:13px;color:#333;outline:none;font-family:inherit;
}
input[type="text"],input[type="password"]{
  font-family:inherit;width:100%;
  border:1px solid #d8d8d8;border-radius:8px;
  padding:8px 12px;font-size:13px;color:#333;outline:none;
  background:#fafafa;transition:border-color .2s;
}
input[type="text"]:focus,input[type="password"]:focus{border-color:#3D95CE;background:#fff}
#upload-area{
  height:90px;border:1px dashed #ccc;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;cursor:pointer;overflow:hidden;position:relative;
  background:#fafafa;transition:border-color .2s;
}
#upload-area:hover{border-color:#3D95CE}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.btn-primary{background:#3D95CE!important;color:#fff!important;border-color:#3D95CE!important}
.btn-primary:hover{background:#2f7db0!important}
/* Toast */
#toast{
  position:absolute;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(0,0,0,.75);color:#fff;font-size:12px;padding:7px 16px;
  border-radius:20px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
  white-space:nowrap;z-index:20;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Auth */
#auth-screen{
  position:fixed;inset:0;
  background:#1a1a1a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:100;
}
#auth-screen h1{font-family:Georgia,serif;font-size:22px;font-weight:normal;color:#fff;letter-spacing:.03em}
#auth-screen p{font-size:13px;color:#888;text-align:center;max-width:260px;line-height:1.5}
.btn-google{
  display:flex;align-items:center;gap:10px;
  background:#fff;color:#333;font-size:14px;font-weight:500;
  border:none;border-radius:8px;padding:10px 20px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.3);transition:box-shadow .2s;
}
.btn-google:hover{box-shadow:0 4px 16px rgba(0,0,0,.4)}
#auth-error{font-size:12px;color:#f87171;display:none}
.btn-signout{font-size:11px!important;padding:0 9px!important;height:28px!important;color:#999!important;border-color:#e8e8e8!important}
</style>
</head>
<body>

<div id="auth-screen">
  <h1>Meraki Salon Manager</h1>
  <p>Sign in with your Google account to continue</p>
  <button class="btn-google" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Sign in with Google
  </button>
  <span id="auth-error"></span>
</div>

<div id="deck-app" style="display:none">

  <div class="deck-header">
    <div style="display:flex;gap:5px;align-items:center">
      <button id="fs-btn" class="btn-icon" onclick="toggleFS()" title="Toggle fullscreen">
        <svg id="fs-icon" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <path d="M1 5V2h3M11 2h3v3M14 10v3h-3M4 13H1v-3"/>
        </svg>
      </button>
      <button class="btn-icon" onclick="openGHSettings()" title="GitHub sync settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <div id="gh-status" style="width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0" title="Not connected"></div>
    </div>
    <div id="deck-dots"></div>
    <div style="display:flex;align-items:center;gap:6px">
      <span id="deck-counter" style="font-size:11px;font-weight:500;color:#888">&#8212;</span>
      <button class="btn-signout" onclick="signOut()" title="Sign out">&#x2192; out</button>
    </div>
  </div>

  <div id="deck-slider">
    <div id="deck-track"></div>
  </div>

  <div class="deck-nav">
    <button id="deck-prev" class="btn-circle" onclick="DN(-1)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8.5 1.5l-4 5 4 5"/></svg>
    </button>
    <div id="deck-actions">
      <button class="action-btn" onclick="DD()">&#128465; Delete</button>
      <button class="action-btn" onclick="openEdit()">&#9998; Edit</button>
      <button class="action-btn" onclick="DM()">+ Add</button>
      <button id="btn-default" class="action-btn" onclick="DSF()">&#9733; Default</button>
    </div>
    <button id="deck-next" class="btn-circle" onclick="DN(1)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4.5 1.5l4 5-4 5"/></svg>
    </button>
  </div>

  <div id="deck-overlay" onclick="OVC(event)">
    <div id="deck-modal">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span id="modal-title" style="font-size:15px;font-weight:600">New slide</span>
        <button class="btn-circle" onclick="DX()" style="font-size:17px">&#215;</button>
      </div>
      <div style="margin-bottom:12px">
        <label class="form-label">Person's name</label>
        <input type="text" id="f-name" placeholder="e.g. Jane Smith" style="font-family:Georgia,serif">
      </div>
      <div style="margin-bottom:12px">
        <label class="form-label">Headshot</label>
        <div id="upload-area" onclick="document.getElementById('f-file').click()">
          <div id="upload-ph" style="display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <span style="font-size:11px;color:#bbb">Click to upload photo</span>
          </div>
        </div>
        <input type="file" id="f-file" accept="image/*" style="display:none" onchange="FI(event)">
      </div>
      <div style="margin-bottom:12px">
        <label class="form-label"><span class="label-dot" style="background:#3D95CE"></span>Venmo username</label>
        <div class="username-wrap">
          <span class="username-at">@</span>
          <input type="text" id="f-venmo" placeholder="username" autocomplete="off" spellcheck="false">
        </div>
      </div>
      <div style="margin-bottom:12px">
        <label class="form-label"><span class="label-dot" style="background:#E1306C"></span>Instagram username</label>
        <div class="username-wrap">
          <span class="username-at">@</span>
          <input type="text" id="f-ig" placeholder="username" autocomplete="off" spellcheck="false">
        </div>
      </div>
      <div style="margin-bottom:12px">
        <label class="form-label"><span class="label-dot" style="background:#1877F2"></span>Facebook username</label>
        <div class="username-wrap">
          <span class="username-at">@</span>
          <input type="text" id="f-fb" placeholder="username" autocomplete="off" spellcheck="false">
        </div>
      </div>
      <div style="margin-bottom:16px">
        <label class="form-label"><span class="label-dot" style="background:#374151"></span>Homepage URL</label>
        <input type="text" id="f-url" placeholder="https://..." autocomplete="off" spellcheck="false">
      </div>
      <div class="modal-actions">
        <button onclick="DX()" style="flex:1">Cancel</button>
        <button id="modal-save-btn" onclick="AS()" class="btn-primary" style="flex:2">Add slide &#8594;</button>
      </div>
    </div>
  </div>

  <div id="gh-overlay" onclick="OGH(event)">
    <div id="gh-modal">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span style="font-size:15px;font-weight:600">GitHub Storage</span>
        <button class="btn-circle" onclick="closeGHSettings()" style="font-size:17px">&#215;</button>
      </div>
      <p style="font-size:12px;color:#888;margin-bottom:14px;line-height:1.6">Syncs slides to <strong>vankimj/meraki-salon-data</strong> (private). Paste a GitHub Personal Access Token with <strong>Contents: Read &amp; Write</strong> access on that repo. <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" style="color:#3D95CE">Create one here ↗</a></p>
      <div style="margin-bottom:12px">
        <label class="form-label">Personal Access Token</label>
        <input type="password" id="gh-f-token" placeholder="ghp_..." autocomplete="off" style="font-family:monospace;font-size:12px">
      </div>
      <div style="margin-bottom:12px">
        <label class="form-label">Repository</label>
        <input type="text" id="gh-f-repo" placeholder="owner/repo-name" autocomplete="off" spellcheck="false">
      </div>
      <div style="margin-bottom:16px">
        <label class="form-label">Data file path</label>
        <input type="text" id="gh-f-path" placeholder="salon-data.json" autocomplete="off" spellcheck="false">
      </div>
      <div class="modal-actions">
        <button onclick="disconnectGH()" style="flex:1;color:#aaa">Disconnect</button>
        <button onclick="syncNow()" style="flex:1">&#8635; Pull</button>
        <button onclick="saveGHSettings()" class="btn-primary" style="flex:2">Save &amp; Connect</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
/* ── Firebase Auth ───────────────────────── */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD2zxSXuxtDKyuXKTpDDjfnKdyhLcLs59c",
  authDomain:        "meraki-salon-manager.firebaseapp.com",
  projectId:         "meraki-salon-manager",
  storageBucket:     "meraki-salon-manager.firebasestorage.app",
  messagingSenderId: "721171829996",
  appId:             "1:721171829996:web:57f1a33d174c966b7fc1c9",
  measurementId:     "G-3TG5KXTVE6"
};
const ALLOWED_EMAILS = ["jvankim@gmail.com"];

firebase.initializeApp(FIREBASE_CONFIG);
const fbAuth = firebase.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();

window.signIn  = () => fbAuth.signInWithPopup(googleProvider).catch(e => {
  const el = document.getElementById('auth-error');
  el.textContent = e.message; el.style.display = 'block';
});
window.signOut = () => fbAuth.signOut();

fbAuth.onAuthStateChanged(user => {
  const authEl = document.getElementById('auth-screen');
  const appEl  = document.getElementById('deck-app');
  if(user && ALLOWED_EMAILS.includes(user.email)){
    authEl.style.display = 'none';
    appEl.style.display  = 'flex';
    if(!window.__appInited){ window.__appInited = true; initApp(); }
  } else {
    if(user) fbAuth.signOut();
    authEl.style.display = 'flex';
    appEl.style.display  = 'none';
  }
});

(function(){
'use strict';

const QS = 148;
let CI = 0, DF = 0, SL = [], PI = null, EI = -1;
let AV = false, HT = null, IT = null;
const GH_DEFAULTS = { owner:'vankimj', repo:'meraki-salon-data', path:'salon-data.json' };
let GH = { token:'', owner:GH_DEFAULTS.owner, repo:GH_DEFAULTS.repo, path:GH_DEFAULTS.path, sha:null };

/* ── Helpers ─────────────────────────────── */
function clean(r){ return r.trim().replace(/^@+/,'').replace(/\s+/g,'').toLowerCase(); }
function normURL(u){ u=u.trim(); return u&&!u.match(/^https?:\/\//)?'https://'+u:u; }
function vURL(u){ return 'https://venmo.com/u/' + u; }
function iURL(u){ return 'https://instagram.com/' + u; }
function fURL(u){ return 'https://facebook.com/' + u; }
function domainOf(u){ try{ return new URL(u).hostname.replace(/^www\./,''); }catch(e){ return u; } }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── Image resize (keeps storage small) ─── */
function resizeImg(src, mw, mh, q){
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height, ar = w / h;
      if (w > mw){ w = mw; h = w / ar; }
      if (h > mh){ h = mh; w = h * ar; }
      const c = document.createElement('canvas');
      c.width = Math.round(w); c.height = Math.round(h);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', q));
    };
    img.src = src;
  });
}

/* ── GitHub Storage ──────────────────────── */
function loadGHCfg(){
  try{
    const d = localStorage.getItem('gh_cfg');
    if(d){
      const p = JSON.parse(d);
      if(p.repo==='Meraki-Salon-Manager'){ p.repo='meraki-salon-data'; saveGHCfg(); }
      GH.token=p.token||''; GH.owner=p.owner||GH_DEFAULTS.owner; GH.repo=p.repo||GH_DEFAULTS.repo; GH.path=p.path||GH_DEFAULTS.path;
    }
  }catch(e){}
}
function saveGHCfg(){
  try{ localStorage.setItem('gh_cfg', JSON.stringify({token:GH.token,owner:GH.owner,repo:GH.repo,path:GH.path})); }catch(e){}
}
function setGHStatus(s){
  const el = document.getElementById('gh-status'); if(!el) return;
  const colors = {idle:'#ccc',syncing:'#f59e0b',synced:'#22c55e',error:'#ef4444'};
  const labels = {idle:'Not connected',syncing:'Syncing…',synced:'Synced with GitHub',error:'Sync error — click gear to check settings'};
  el.style.background = colors[s]||'#ccc'; el.title = labels[s]||s;
}
function safeB64Enc(str){ return btoa(unescape(encodeURIComponent(str))); }
function safeB64Dec(b64){ return decodeURIComponent(escape(atob(b64.replace(/\s/g,'')))); }

async function ghAPI(method, body){
  const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`;
  const r = await fetch(url, {
    method,
    headers: {'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  if(!r.ok){ const e = await r.json().catch(()=>({})); const err = new Error(e.message||'GitHub API error'); err.status = r.status; throw err; }
  return r.json();
}

async function ghLoad(){
  if(!GH.token||!GH.owner||!GH.repo) return false;
  setGHStatus('syncing');
  try{
    const data = await ghAPI('GET');
    const parsed = JSON.parse(safeB64Dec(data.content));
    GH.sha = data.sha;
    SL = parsed.slides||[]; DF = parsed.def||0; CI = Math.min(parsed.cur||0, Math.max(0,(parsed.slides||[]).length-1));
    setGHStatus('synced'); return true;
  }catch(e){
    if(e.status===404){ GH.sha=null; setGHStatus('synced'); return true; }
    setGHStatus('error'); return false;
  }
}

async function ghSave(){
  if(!GH.token||!GH.owner||!GH.repo) return;
  setGHStatus('syncing');
  try{
    const body = {message:'Update salon data', content:safeB64Enc(JSON.stringify({slides:SL,def:DF,cur:CI}))};
    if(GH.sha) body.sha = GH.sha;
    const data = await ghAPI('PUT', body);
    GH.sha = data.content.sha; setGHStatus('synced');
  }catch(e){
    if(e.status===409){
      try{
        const cur = await ghAPI('GET'); GH.sha = cur.sha;
        const body = {message:'Update salon data', content:safeB64Enc(JSON.stringify({slides:SL,def:DF,cur:CI})), sha:GH.sha};
        const data = await ghAPI('PUT', body); GH.sha = data.content.sha; setGHStatus('synced');
      }catch(e2){ setGHStatus('error'); toast('GitHub sync failed'); }
    } else {
      setGHStatus('error'); toast('GitHub sync failed — check settings');
    }
  }
}

/* ── Local Persistence ───────────────────── */
function save(){
  try{
    localStorage.setItem('sd_v2', JSON.stringify({slides:SL,def:DF,cur:CI}));
  }catch(e){
    toast('Storage full — changes may not persist');
  }
  ghSave();
}
function load(){
  try{
    const d = localStorage.getItem('sd_v2');
    if(d){ const p = JSON.parse(d); SL=p.slides||[]; DF=p.def||0; CI=Math.min(p.cur||0,Math.max(0,(p.slides||[]).length-1)); }
  }catch(e){}
}

/* ── Fullscreen ──────────────────────────── */
const EXPAND_ICON = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 5V2h3M11 2h3v3M14 10v3h-3M4 13H1v-3"/></svg>`;
const COLLAPSE_ICON = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 1v3H1M11 1v3h3M11 14v-3h3M4 14v-3H1"/></svg>`;

function isFS(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }

window.toggleFS = function(){
  const app = document.getElementById('deck-app');
  if(isFS()){
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    if(app.requestFullscreen) app.requestFullscreen();
    else if(app.webkitRequestFullscreen) app.webkitRequestFullscreen();
    else toast('Fullscreen not supported — try adding to home screen');
  }
};

['fullscreenchange','webkitfullscreenchange'].forEach(ev =>
  document.addEventListener(ev, () => {
    document.getElementById('fs-btn').innerHTML = isFS() ? COLLAPSE_ICON : EXPAND_ICON;
  })
);

/* ── Inactivity timer ────────────────────── */
function rI(){
  clearTimeout(IT);
  if(!SL.length) return;
  IT = setTimeout(() => {
    const t = Math.min(DF, SL.length-1);
    if(CI !== t){ CI=t; document.getElementById('deck-track').style.transform=`translateX(-${CI*100}%)`; UI(); }
  }, 60000);
}
['mousemove','mousedown','touchstart','keydown','click'].forEach(ev =>
  document.addEventListener(ev, rI, {passive:true})
);

/* ── Actions panel ───────────────────────── */
function sA(){ AV=true; document.getElementById('deck-actions').classList.add('visible'); clearTimeout(HT); HT=setTimeout(hA,3500); }
function hA(){ AV=false; document.getElementById('deck-actions').classList.remove('visible'); }
function tA(){ AV ? hA() : sA(); }

/* ── QR cycle ────────────────────────────── */
function qrIds(sl, i){
  const ids = [];
  if(sl.vu) ids.push('vv'+i);
  if(sl.iu) ids.push('iv'+i);
  if(sl.fu) ids.push('fv'+i);
  if(sl.hu) ids.push('wv'+i);
  return ids;
}
window.nextQR = function(i){
  const sl = SL[i]; if(!sl) return;
  const ids = qrIds(sl, i); if(ids.length < 2) return;
  const cur = ids.findIndex(id => !document.getElementById(id).classList.contains('hidden'));
  const nxt = (cur + 1) % ids.length;
  ids.forEach((id, j) => {
    document.getElementById(id).classList.toggle('hidden', j !== nxt);
    const dot = document.getElementById('qd'+j+'_'+i);
    if(dot) dot.style.background = j === nxt ? '#333' : '#ccc';
  });
  rI();
};

/* ── SVG logos ───────────────────────────── */
const VSG = `<svg viewBox="0 0 148 44" xmlns="http://www.w3.org/2000/svg" width="148" height="44"><rect width="148" height="44" rx="8" fill="#3D95CE"/><text x="74" y="30" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="24" font-weight="700" fill="white">Venmo</text></svg>`;
const ISG = `<svg viewBox="0 0 148 44" xmlns="http://www.w3.org/2000/svg" width="148" height="44"><rect width="148" height="44" rx="8" fill="#E1306C"/><rect x="8" y="10" width="24" height="24" rx="6" fill="none" stroke="white" stroke-width="2.2"/><circle cx="20" cy="22" r="6.2" fill="none" stroke="white" stroke-width="2.2"/><circle cx="28.5" cy="13.5" r="2.5" fill="white"/><text x="95" y="30" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="19" font-weight="700" fill="white">Instagram</text></svg>`;
const FSG = `<svg viewBox="0 0 148 44" xmlns="http://www.w3.org/2000/svg" width="148" height="44"><rect width="148" height="44" rx="8" fill="#1877F2"/><text x="74" y="30" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="22" font-weight="700" fill="white">Facebook</text></svg>`;
const WSG = `<svg viewBox="0 0 148 44" xmlns="http://www.w3.org/2000/svg" width="148" height="44"><rect width="148" height="44" rx="8" fill="#374151"/><circle cx="18" cy="22" r="11" fill="none" stroke="white" stroke-width="2"/><ellipse cx="18" cy="22" rx="5" ry="11" fill="none" stroke="white" stroke-width="2"/><line x1="7" y1="22" x2="29" y2="22" stroke="white" stroke-width="2"/><text x="90" y="30" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="700" fill="white">Website</text></svg>`;

function phSVG(c){
  const s = `<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400"><rect width="300" height="400" fill="${c}"/><circle cx="150" cy="140" r="60" fill="rgba(255,255,255,.15)"/><ellipse cx="150" cy="320" rx="100" ry="70" fill="rgba(255,255,255,.1)"/></svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s);
}

/* ── Build slide HTML ────────────────────── */
function bS(sl, i){
  const isDF=i===DF, hn=!!(sl.name&&sl.name.trim());
  const photo = sl.img
    ? `<img src="${sl.img}" alt="headshot">`
    : `<div style="display:flex;flex-direction:column;align-items:center;gap:8px;color:#ccc"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span style="font-size:11px">No photo</span></div>`;
  const panels = [];
  if(sl.vu) panels.push({elId:'vv'+i, qId:'qv'+i, svg:VSG, label:'@'+sl.vu});
  if(sl.iu) panels.push({elId:'iv'+i, qId:'qi'+i, svg:ISG, label:'@'+sl.iu});
  if(sl.fu) panels.push({elId:'fv'+i, qId:'qf'+i, svg:FSG, label:'@'+sl.fu});
  if(sl.hu) panels.push({elId:'wv'+i, qId:'qw'+i, svg:WSG, label:domainOf(sl.hu)});
  const multi = panels.length > 1;
  const panelsHTML = panels.map((p,j) =>
    `<div id="${p.elId}" class="qr-view${j>0?' hidden':''}">${p.svg}<div id="${p.qId}" style="width:${QS}px;height:${QS}px;display:flex;align-items:center;justify-content:center;flex-shrink:0"></div><div class="qr-handle-text">${p.label}</div></div>`
  ).join('');
  const dots = multi ? `<div class="qr-dots">${panels.map((_,j)=>`<div id="qd${j}_${i}" class="qr-dot" style="background:${j===0?'#333':'#ccc'}"></div>`).join('')}</div>` : '';
  const hint = multi ? `<div class="tap-hint">tap to switch</div>` : '';
  return `<div class="slide-wrap">
    <div class="slide-left">
      <div class="slide-photo">${photo}${isDF?'<div class="default-badge">DEFAULT</div>':''}</div>
      <div class="nameplate">${hn?`<span class="nameplate-name">${sl.name}</span>`:'<span class="nameplate-empty">No name</span>'}</div>
    </div>
    <div class="${multi?'slide-right tappable':'slide-right'}" ${multi?`onclick="nextQR(${i})"`:''}>
      ${hint}${panelsHTML}${dots}
    </div>
  </div>`;
}

/* ── Render all slides ───────────────────── */
function RA(){
  const track = document.getElementById('deck-track');
  if(!SL.length){
    track.innerHTML = `<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.3" stroke-linecap="round"><circle cx="12" cy="9" r="5"/><path d="M3 21c0-5 4-9 9-9s9 4 9 9"/></svg><div style="font-size:14px;font-weight:500;color:#aaa">No slides yet</div><div style="font-size:12px;color:#ccc">Swipe up or down to get started</div></div>`;
    UI(); return;
  }
  track.innerHTML = SL.map(bS).join('');
  track.style.transform = `translateX(-${CI*100}%)`;
  UI();
  setTimeout(() => {
    const mkQR = (elId, url) => { const e=document.getElementById(elId); if(e&&url) try{ new QRCode(e,{text:url,width:QS,height:QS,colorDark:'#1a1a1a',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M}); }catch(x){} };
    SL.forEach((sl,i) => {
      if(sl.vu) mkQR('qv'+i, vURL(sl.vu));
      if(sl.iu) mkQR('qi'+i, iURL(sl.iu));
      if(sl.fu) mkQR('qf'+i, fURL(sl.fu));
      if(sl.hu) mkQR('qw'+i, sl.hu);
    });
  }, 65);
  rI();
}

/* ── Update UI controls ──────────────────── */
function UI(){
  const n = SL.length;
  document.getElementById('deck-counter').textContent = n ? `${CI+1} / ${n}` : '—';
  document.getElementById('deck-prev').disabled = CI===0 || !n;
  document.getElementById('deck-next').disabled = CI===n-1 || !n;
  document.getElementById('deck-dots').innerHTML = SL.map((_,i) => {
    const a=i===CI, d=i===DF;
    return `<div class="dot-wrap"><div class="dot-bar" style="width:${a?18:6}px;background:${a?'#333':'#ccc'};${d&&!a?'outline:1.5px solid #f59e0b;outline-offset:1px':''}"></div><div class="dot-star" style="background:${d?'#f59e0b':'transparent'}"></div></div>`;
  }).join('');
  const db = document.getElementById('btn-default');
  if(db) db.textContent = CI===DF ? '★ Default ✓' : '★ Default';
}

/* ── Navigation ──────────────────────────── */
window.DN = function(dir){
  const ni = CI + dir;
  if(ni >= 0 && ni < SL.length){ CI=ni; document.getElementById('deck-track').style.transform=`translateX(-${CI*100}%)`; UI(); rI(); }
};

window.DD = function(){
  if(!SL.length) return;
  SL.splice(CI,1);
  if(!SL.length){ DF=0; CI=0; hA(); save(); RA(); return; }
  if(DF >= SL.length) DF = SL.length-1;
  CI = Math.min(CI, SL.length-1);
  hA(); save(); RA();
};

window.DSF = function(){ DF=CI; hA(); save(); RA(); toast("Default slide set"); };

/* ── Swipe / drag ────────────────────────── */
let sx=0, sy=0, pa=false;
const se = document.getElementById('deck-slider');
se.addEventListener('mousedown', e => { sx=e.clientX; sy=e.clientY; pa=true; e.preventDefault(); }, {passive:false});
document.addEventListener('mouseup', e => {
  if(!pa) return; pa=false;
  const dx=e.clientX-sx, dy=e.clientY-sy, ax=Math.abs(dx), ay=Math.abs(dy);
  if(ay>ax && ay>38) tA();
  else if(ax>ay && ax>48) DN(dx<0?1:-1);
});
se.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; pa=true; }, {passive:true});
se.addEventListener('touchend', e => {
  if(!pa) return; pa=false;
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy, ax=Math.abs(dx), ay=Math.abs(dy);
  if(ay>ax && ay>38) tA();
  else if(ax>ay && ax>48) DN(dx<0?1:-1);
}, {passive:true});
document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft') DN(-1);
  if(e.key==='ArrowRight') DN(1);
  if(e.key==='ArrowUp'||e.key==='ArrowDown'){ e.preventDefault(); tA(); }
  if(e.key==='f'||e.key==='F') toggleFS();
});

/* ── Modal helpers ───────────────────────── */
function openModalOverlay(){
  document.getElementById('deck-overlay').style.display = 'flex';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('deck-modal').style.transform = 'translateY(0)';
  }));
}

function populateUploadPreview(imgSrc){
  const ua = document.getElementById('upload-area');
  ua.querySelectorAll('img').forEach(x => x.remove());
  if(imgSrc){
    document.getElementById('upload-ph').style.display = 'none';
    const img = document.createElement('img');
    img.src = imgSrc;
    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
    ua.appendChild(img);
  } else {
    document.getElementById('upload-ph').style.display = 'flex';
  }
}

/* ── Open modal: Add new slide ───────────── */
window.DM = function(){
  EI = -1; PI = null; hA();
  document.getElementById('f-name').value = '';
  document.getElementById('f-venmo').value = '';
  document.getElementById('f-ig').value = '';
  document.getElementById('f-fb').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('f-file').value = '';
  document.getElementById('modal-title').textContent = 'New slide';
  document.getElementById('modal-save-btn').textContent = 'Add slide \u2192';
  populateUploadPreview(null);
  openModalOverlay();
};

/* ── Open modal: Edit existing slide ──────── */
window.openEdit = function(){
  var i = CI;
  if(i < 0 || i >= SL.length) return;
  const sl = SL[i];
  EI = i; PI = sl.img || null; hA();
  document.getElementById('f-name').value = sl.name || '';
  document.getElementById('f-venmo').value = sl.vu || '';
  document.getElementById('f-ig').value = sl.iu || '';
  document.getElementById('f-fb').value = sl.fu || '';
  document.getElementById('f-url').value = sl.hu || '';
  document.getElementById('f-file').value = '';
  document.getElementById('modal-title').textContent = 'Edit slide';
  document.getElementById('modal-save-btn').textContent = 'Save changes \u2713';
  populateUploadPreview(sl.img || null);
  openModalOverlay();
};

/* ── Close modal ─────────────────────────── */
window.DX = function(){
  document.getElementById('deck-modal').style.transform = 'translateY(100%)';
  setTimeout(() => { document.getElementById('deck-overlay').style.display = 'none'; }, 360);
};
window.OVC = function(e){ if(e.target===document.getElementById('deck-overlay')) DX(); };

/* ── File input ──────────────────────────── */
window.FI = function(ev){
  const file = ev.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    resizeImg(e.target.result, 800, 1000, 0.78).then(resized => {
      PI = resized;
      populateUploadPreview(PI);
    });
  };
  r.readAsDataURL(file);
};

/* ── Add / Save slide ────────────────────── */
window.AS = function(){
  const vu = clean(document.getElementById('f-venmo').value);
  const iu = clean(document.getElementById('f-ig').value);
  const fu = clean(document.getElementById('f-fb').value);
  const hu = normURL(document.getElementById('f-url').value);
  const name = document.getElementById('f-name').value.trim();
  if(!vu && !iu && !fu && !hu){ document.getElementById('f-venmo').focus(); return; }

  if(EI >= 0){
    SL[EI] = { img: PI, name: name||null, vu: vu||null, iu: iu||null, fu: fu||null, hu: hu||null };
    toast('Slide updated');
  } else {
    SL.push({ img: PI, name: name||null, vu: vu||null, iu: iu||null, fu: fu||null, hu: hu||null });
    CI = SL.length - 1;
    toast('Slide added');
  }
  DX(); save(); setTimeout(RA, 370);
};

/* ── GitHub Settings UI ──────────────────── */
window.openGHSettings = function(){
  document.getElementById('gh-f-token').value = GH.token;
  document.getElementById('gh-f-repo').value = GH.owner&&GH.repo ? `${GH.owner}/${GH.repo}` : `${GH_DEFAULTS.owner}/${GH_DEFAULTS.repo}`;
  document.getElementById('gh-f-path').value = GH.path || GH_DEFAULTS.path;
  const el = document.getElementById('gh-overlay');
  el.style.display = 'flex';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('gh-modal').style.transform = 'translateY(0)';
    if(!GH.token) setTimeout(() => document.getElementById('gh-f-token').focus(), 380);
  }));
};
window.closeGHSettings = function(){
  document.getElementById('gh-modal').style.transform = 'translateY(100%)';
  setTimeout(() => { document.getElementById('gh-overlay').style.display = 'none'; }, 360);
};
window.OGH = function(e){ if(e.target===document.getElementById('gh-overlay')) closeGHSettings(); };

window.saveGHSettings = async function(){
  const token = document.getElementById('gh-f-token').value.trim();
  const repo  = document.getElementById('gh-f-repo').value.trim();
  const path  = document.getElementById('gh-f-path').value.trim() || 'salon-data.json';
  const parts = repo.split('/');
  if(!token || parts.length!==2 || !parts[0] || !parts[1]){
    toast('Enter a valid token and owner/repo'); return;
  }
  GH.token=token; GH.owner=parts[0]; GH.repo=parts[1]; GH.path=path; GH.sha=null;
  saveGHCfg();
  closeGHSettings();
  const ok = await ghLoad();
  if(ok){ RA(); toast('Connected to GitHub!'); }
  else { toast('Connection failed — check token and repo name'); }
};

window.disconnectGH = function(){
  GH = {token:'',owner:'',repo:'',path:'salon-data.json',sha:null};
  saveGHCfg(); setGHStatus('idle'); closeGHSettings(); toast('Disconnected from GitHub');
};

window.syncNow = async function(){
  closeGHSettings();
  const ok = await ghLoad();
  if(ok){ RA(); toast('Synced from GitHub'); }
  else { toast('Sync failed — check settings'); }
};

/* ── Init ────────────────────────────────── */
const DEFAULTS = [
  { img: phSVG('#4A7DB5'), name: 'Jane Smith',     vu: 'janesmith', iu: 'janesmith'  },
  { img: phSVG('#2D7A5F'), name: 'Robert Johnson', vu: 'robertj',   iu: 'robertj'    },
];

window.initApp = function(){
  loadGHCfg();
  if(GH.token && GH.owner && GH.repo){
    ghLoad().then(ok => {
      if(!ok) load();
      if(!SL.length) SL = DEFAULTS;
      RA();
    });
  } else {
    load();
    if(!SL.length) SL = DEFAULTS;
    RA();
    setTimeout(openGHSettings, 800);
  }
};

})();
